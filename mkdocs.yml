site_name: Learning Hub
site_description: Slides, code, and resources for Computer Science courses
site_author: David Escobar Castillejos
site_url: https://davidowa.github.io/learning-hub/
repo_url: https://github.com/davidowa/learning-hub
repo_name: davidowa/learning-hub
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  favicon: assets/images/favicon.ico
  logo: assets/images/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search:
      lang:
        - en
        - es
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Courses: Cursos
            Resources: Recursos
            Computational Thinking: Pensamiento Computacional
            Overview: Descripción general
            Problem Solving: Resolución de problemas
            Flowcharts: Diagramas de flujo
            Pseudocode: Pseudocódigo
            Programming Foundations: Fundamentos de programación
            "C sharp (C#)": "C sharp (C#)"
            Python: Python
            Basics: Bases
            OOP: POO
            "Paths & Files": "Archivos y rutas"
            SQLite: SQLite
            GUI: GUI
            Advanced: Avanzado
            Activities: Actividades

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/davidowa
  generator: false

extra_css:
  - assets/css/identity.css

nav:
  - Home: index.md
  - Courses:
      - courses/index.md
      - Computational Thinking:
          - Overview: courses/computational-thinking-course/index.md
          - 01 · Problem Solving: courses/computational-thinking-course/01-problem-solving.md
          - 02 · Flowcharts: courses/computational-thinking-course/02-flowcharts.md
          - 03 · Pseudocode: courses/computational-thinking-course/03-pseudocode.md
          - 04 · Programming Foundations: courses/computational-thinking-course/04-programming-foundations.md
      - C sharp (C#):
          - Overview: courses/cs-course/index.md
      - Python:
          - Overview: courses/python-course/index.md
          - 01 · Basics: courses/python-course/01-basics.md
          - 02 · OOP: courses/python-course/02-oop.md
          - 03 · Paths & Files: courses/python-course/03-paths-files.md
          - 04 · SQLite: courses/python-course/04-sqlite.md
          - 05 · GUI: courses/python-course/05-gui.md
          - 06 · Advanced: courses/python-course/06-advanced.md
          - 07 · Activities: courses/python-course/07-activities.md
  - Resources: resources.md
